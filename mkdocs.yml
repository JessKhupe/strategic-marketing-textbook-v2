site_name: Strategic Marketing in the AI Age
site_description: 'A strategic marketing textbook for the AI age that blends marketing principles with machine intelligence.'
site_author: 'Jessica Khupe'
repo_name: 'GitHub Repo'
site_url: 'https://jessicakhupe.github.io/strategic-marketing-in-the-ai-age/'
repo_url: 'https://github.com/jessicakhupe/strategic-marketing-in-the-ai-age'
edit_uri: 'blob/master/docs'

nav:
  - "Home": index.md
  - "Chapter 1: Marketing Fundamentals Meet Machine Intelligence": chapter-01-marketing-fundamentals-meet-machine-intelligence.md
  - "Chapter 2: AI & Machine Learning Foundations for Marketers": chapter-02-ai-machine-learning-foundations-for-marketers.md
  - "Chapter 3: Data Infrastructure: The Foundation of AI Marketing": chapter-03-data-infrastructure-foundation.md
  - "Chapter 4: Personalization Engines: From Segments to Individuals": chapter-04-personalization-engines.md
  - "Chapter 5: Content Generation & Brand Voice at Scale": chapter-05-content-generation-brand-voice.md
  - "Chapter 6: Customer Analytics: From Hindsight to Foresight": chapter-06-customer-analytics.md
  - "Chapter 7: Attribution & Performance Measurement": chapter-07-attribution-performance.md
  - "Chapter 8: Marketing Automation: From Workflows to Intelligent Systems": chapter-08-marketing-automation.md
  - "Chapter 9: Ethical AI Marketing & Responsible Automation": chapter-09-ethical-ai-marketing.md
  - "Chapter 10: Accessibility & Inclusive Marketing": chapter-10-accessibility-inclusive.md
  - "Chapter 11: Channel Strategy & Omnichannel Orchestration": chapter-11-channel-strategy.md
  - "Chapter 12: Conversion Optimization & Growth Experimentation": chapter-12-conversion-optimization.md
  - "Chapter 13: Customer Retention & Loyalty Systems": chapter-13-customer-retention.md
  - "Chapter 14: Autonomous Growth Systems & Product-Led Growth": chapter-14-autonomous-growth-systems.md
  - "Chapter 15: Strategic AI Marketing Leadership & Transformation": chapter-15-strategic-ai-marketing-leadership.md


theme:
  name: material
  logo: img/logo.png
  favicon: img/favicon.ico
  palette:
    primary: 'blue'
    accent: 'orange'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    # this adds the prev and next icons in the footer
    - navigation.footer
    - content.action.edit
plugins:
  - search
  - social
  - social_override
markdown_extensions:
  - admonition
  - md_in_html # required for multiple-choice question numbering
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
extra_css:
   - css/extra.css
   - css/axiom-mascot.css
extra_javascript:
    - js/extra.js
    # needed for mathjax to work
    - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
copyright: Copyright &copy; 2026 Jessica Khupe. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.
extra:
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  generator: false
  analytics:
    provider: google
    property: G-D7X1XT7Z19
