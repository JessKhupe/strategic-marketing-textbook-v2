name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install system dependencies for social cards
        run: sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install MkDocs and plugins
        run: pip install mkdocs "mkdocs-material[imaging]"

      - name: Install local plugins
        run: pip install -e .
        continue-on-error: true

      - name: Build and deploy
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: mkdocs gh-deploy --force
